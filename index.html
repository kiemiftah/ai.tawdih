<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI.Tawdih - AI Assistant Tutor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-track { background: transparent; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Animasi Masuk */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Animasi Terapung Robot */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: floating 3s ease-in-out infinite; }

        /* Prevent body scroll when modal is full screen on mobile */
        @media (max-width: 640px) {
            body { overflow: hidden; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-[100dvh]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // URL Imej Rasmi
        const BOT_IMAGE_URL = "https://img2link.kiemiftah.com/uploads/ai-tawdihbot.png";

        // --- Komponen Ikon SVG ---
        const IconSend = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" />
            </svg>
        );

        const IconLoader = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin">
                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </svg>
        );

        const IconRefresh = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
            </svg>
        );

        const IconLock = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('setup');
            const [isLearned, setIsLearned] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === "admin123") {
                    setIsAuthenticated(true);
                } else {
                    alert('Kod salah / Invalid code.');
                }
            };

            const handleReset = () => {
                setMessages([]);
                setIsLearned(false);
                setActiveTab('setup');
            };

            const callGeminiAPI = async (userPrompt) => {
                const apiKey = ""; 
                const delays = [1000, 2000, 4000, 8000, 16000];
                const payload = {
                    contents: [{ 
                        parts: [{ text: `Anda adalah AI.Tawdih, AI Assistant Tutor profesional. Berikan bimbingan akademik yang jelas dan berstruktur dalam Bahasa Melayu. Galakkan pemikiran kritis. Soalan: ${userPrompt}` }] 
                    }]
                };

                for (let i = 0; i < delays.length; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        if (i === delays.length - 1) throw error;
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            };

            const startLearningProcess = async () => {
                setIsProcessing(true);
                try {
                    await new Promise(r => setTimeout(r, 2000));
                    setIsLearned(true);
                    setActiveTab('chat');
                } finally {
                    setIsProcessing(false);
                }
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || isTyping) return;
                const userText = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setIsTyping(true);
                try {
                    const response = await callGeminiAPI(userText);
                    setMessages(prev => [...prev, { role: 'assistant', content: response || "Maaf, ralat maklum balas." }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "Gangguan rangkaian." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="flex items-center justify-center min-h-[100dvh] sm:p-4 lg:p-8">
                    
                    {/* Chat Interface Container */}
                    <div className="w-full h-[100dvh] sm:h-auto sm:max-w-lg sm:max-h-[90vh] bg-white sm:rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.2)] flex flex-col overflow-hidden border border-slate-200 animate-fade-in relative">
                        
                        {/* Header */}
                        <div className="bg-indigo-600 p-4 sm:p-6 text-white flex justify-between items-center shrink-0 z-10">
                            <div className="flex items-center gap-3 sm:gap-4">
                                <div className="w-10 h-10 sm:w-12 sm:h-12 bg-white/10 rounded-xl p-1 shrink-0">
                                    <img src={BOT_IMAGE_URL} alt="AI Tawdih Bot" className="w-full h-full object-contain" />
                                </div>
                                <div>
                                    <h2 className="font-bold text-base sm:text-lg leading-tight">AI.Tawdih</h2>
                                    <p className="text-[9px] sm:text-[10px] text-indigo-100 uppercase tracking-widest font-black italic">Official AI Assistant Tutor</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-1 sm:gap-2">
                                {isLearned && (
                                    <button onClick={handleReset} title="Mula Semula" className="p-2 sm:p-2.5 hover:bg-white/10 rounded-full transition-colors active:scale-90">
                                        <IconRefresh size={18} />
                                    </button>
                                )}
                                <button 
                                    onClick={() => setActiveTab(activeTab === 'admin' ? (isLearned ? 'chat' : 'setup') : 'admin')}
                                    className={`p-2 sm:p-2.5 rounded-full transition-colors active:scale-90 ${activeTab === 'admin' ? 'bg-white text-indigo-600 shadow-sm' : 'hover:bg-white/10'}`}
                                    title="Pentadbir / Admin"
                                >
                                    <IconLock size={18} />
                                </button>
                            </div>
                        </div>

                        {/* Content Scrollable Area */}
                        <div className="flex-1 overflow-y-auto bg-slate-50/50 p-4 sm:p-6 space-y-4 sm:space-y-6 scroll-custom">
                            
                            {/* TAB PENTADBIR */}
                            {activeTab === 'admin' && (
                                <div className="h-full flex flex-col items-center justify-center space-y-6 py-4">
                                    {!isAuthenticated ? (
                                        <div className="w-full bg-white p-6 sm:p-10 rounded-[2rem] sm:rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                            <div className="mx-auto w-14 h-14 sm:w-16 sm:h-16 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 mb-6 shrink-0">
                                                <IconLock size={28} />
                                            </div>
                                            <h3 className="font-bold text-slate-800 text-sm mb-6 uppercase tracking-widest">Akses Pentadbir / Admin</h3>
                                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                                <input 
                                                    type="password" 
                                                    placeholder="Kod keselamatan / Code..."
                                                    className="w-full p-4 sm:p-5 bg-slate-50 border border-slate-100 rounded-2xl sm:rounded-3xl text-sm outline-none focus:ring-4 focus:ring-indigo-100 text-center transition-all font-bold"
                                                    value={adminPassword}
                                                    onChange={(e) => setAdminPassword(e.target.value)}
                                                />
                                                <button className="w-full bg-indigo-600 text-white py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-bold text-[11px] uppercase tracking-widest active:scale-95 shadow-xl shadow-indigo-100 transition-all">Sahkan Akses</button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="text-center p-8 sm:p-10 bg-white rounded-[2rem] sm:rounded-[2.5rem] shadow-sm border border-slate-100 w-full">
                                            <div className="text-indigo-600 font-black mb-4 italic text-sm tracking-widest uppercase">Logged In</div>
                                            <p className="text-xs text-slate-500 font-medium leading-relaxed">Panel pengurusan bahan bimbingan akan tersedia tidak lama lagi.</p>
                                            <button onClick={() => setIsAuthenticated(false)} className="mt-8 text-xs text-red-500 font-bold hover:underline tracking-widest uppercase">Log Keluar / Logout</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* TAB SETUP */}
                            {activeTab === 'setup' && (
                                <div className="h-full flex flex-col items-center justify-center text-center p-4">
                                    <div className="w-32 h-32 sm:w-44 sm:h-44 mb-6 sm:mb-8 shrink-0 animate-float">
                                        <img src={BOT_IMAGE_URL} alt="Bot" className="w-full h-full object-contain drop-shadow-2xl" />
                                    </div>
                                    <h3 className="font-bold text-slate-800 mb-4 text-lg sm:text-xl tracking-tight leading-tight uppercase">AI.TAWDIH</h3>
                                    <p className="text-[10px] sm:text-[12px] text-slate-500 leading-tight mb-8 sm:mb-12 font-medium px-2 whitespace-nowrap">
                                        Sila tekan Mula Bimbingan untuk bertanya soalan dengan AI.Tawdih Tutor.
                                        <span className="opacity-60 block mt-1 font-normal italic text-[9px] sm:text-[11px] text-indigo-500 whitespace-normal">
                                            Please press Start Tutoring to ask questions with AI.Tawdih Tutor.
                                        </span>
                                    </p>
                                    <button 
                                        onClick={startLearningProcess}
                                        disabled={isProcessing}
                                        className="w-full max-w-[280px] sm:max-w-[320px] bg-indigo-600 text-white py-4 sm:py-5 rounded-2xl sm:rounded-[2rem] font-bold text-[10px] sm:text-[12px] uppercase tracking-widest shadow-2xl shadow-indigo-200 flex items-center justify-center gap-4 hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50 min-h-[56px] sm:min-h-[64px]"
                                    >
                                        {isProcessing ? <IconLoader size={20} /> : 'Mula Bimbingan / Start Tutoring'}
                                    </button>
                                </div>
                            )}

                            {/* TAB CHAT */}
                            {activeTab === 'chat' && (
                                <div className="space-y-4 sm:space-y-6 pb-4">
                                    {messages.length === 0 && (
                                        <div className="text-center py-20 sm:py-24 text-slate-400 text-[11px] sm:text-[12px] italic font-medium leading-relaxed">
                                            Tanya soalan akademik berkaitan topik anda.<br/>
                                            <span className="opacity-60">Sedia membantu bimbingan anda. / Ready to help.</span>
                                        </div>
                                    )}
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[88%] p-4 sm:p-5 rounded-[1.5rem] sm:rounded-[2rem] text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none font-medium'}`}>
                                                {m.content}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="flex gap-2 ml-4 items-center animate-pulse">
                                            <div className="flex gap-1">
                                                <span className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></span>
                                                <span className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                                <span className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                            </div>
                                            <span className="text-[9px] sm:text-[10px] text-indigo-400 font-bold uppercase tracking-tighter">Tutor Berfikir...</span>
                                        </div>
                                    )}
                                    <div ref={scrollRef} />
                                </div>
                            )}
                        </div>

                        {/* Input Area */}
                        {activeTab === 'chat' && (
                            <div className="p-4 sm:p-6 bg-white border-t border-slate-100 shrink-0">
                                <form onSubmit={sendMessage} className="relative flex items-center gap-2 sm:gap-3">
                                    <input 
                                        type="text" 
                                        placeholder="Tanya tutor anda..."
                                        className="flex-1 p-4 sm:p-5 bg-slate-50 border border-slate-200 rounded-2xl sm:rounded-[2rem] text-sm outline-none focus:ring-4 focus:ring-indigo-100 transition-all font-medium placeholder:text-slate-400"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                    />
                                    <button 
                                        type="submit"
                                        className="p-3.5 sm:p-4 bg-indigo-600 text-white rounded-xl sm:rounded-[1.5rem] shadow-xl shadow-indigo-100 active:scale-95 transition-all flex items-center justify-center shrink-0 min-w-[48px] min-h-[48px]"
                                    >
                                        <IconSend size={20} />
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
