<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI.Tawdih - AI Assistant Tutor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-track { background: transparent; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: floating 3s ease-in-out infinite; }

        @media (max-width: 640px) {
            body { overflow: hidden; }
        }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-[100dvh]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BOT_IMAGE_URL = "https://img2link.kiemiftah.com/uploads/ai-tawdihbot.png";

        // --- Ikon SVG ---
        const IconSend = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" />
            </svg>
        );

        const IconLoader = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin">
                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </svg>
        );

        const IconRefresh = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
            </svg>
        );

        const IconLock = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        );

        const IconTrash = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            </svg>
        );

        const IconCloud = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5A7 7 0 1 0 5 13.5c0 .3 0 .7.1 1a5 5 0 1 0 5.4 4.5h7z" />
            </svg>
        );

        const IconHelp = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
        );

        const IconX = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        );

        const IconCopy = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
        );

        const IconArrowLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" />
            </svg>
        );

        const IconLogOut = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" />
            </svg>
        );

        const APPS_SCRIPT_CODE = `/**
 * GOOGLE APPS SCRIPT UNTUK AI.TAWDIH
 * Memungkinkan penyimpanan data secara otomatis dengan pembuatan header.
 */

function setup() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Sheet1") || ss.insertSheet("Sheet1");
  var firstRow = sheet.getRange(1, 1, 1, 3).getValues()[0];
  
  // Jika baris pertama bukan header 'id', buat header baru
  if (firstRow[0] !== "id") {
    sheet.insertRowBefore(1);
    sheet.getRange(1, 1, 1, 3).setValues([["id", "name", "url"]]);
    sheet.getRange(1, 1, 1, 3)
         .setFontWeight("bold")
         .setBackground("#4f46e5")
         .setFontColor("white")
         .setHorizontalAlignment("center");
    sheet.setFrozenRows(1);
  }
}

function doGet() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Sheet1");
  if (!sheet) return ContentService.createTextOutput("[]").setMimeType(ContentService.MimeType.JSON);
  
  var data = sheet.getDataRange().getValues();
  var result = [];
  
  // Ambil data mulai dari baris ke-2
  for (var i = 1; i < data.length; i++) {
    if (data[i][0]) {
      result.push({ 
        id: data[i][0].toString(), 
        name: data[i][1], 
        url: data[i][2] 
      });
    }
  }
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  setup(); // Pastikan header ada sebelum menambah data
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Sheet1");
  var params = JSON.parse(e.postData.contents);
  
  if (params.action === "add") {
    sheet.appendRow([params.id, params.name, params.url]);
    return ContentService.createTextOutput("Berhasil").setMimeType(ContentService.MimeType.TEXT);
  } else if (params.action === "delete") {
    var data = sheet.getDataRange().getValues();
    for (var i = 1; i < data.length; i++) {
      if (data[i][0].toString() === params.id.toString()) {
        sheet.deleteRow(i + 1);
        break;
      }
    }
    return ContentService.createTextOutput("Dihapus").setMimeType(ContentService.MimeType.TEXT);
  }
}`;

        function App() {
            const [activeTab, setActiveTab] = useState('setup');
            const [isLearned, setIsLearned] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isTutorialOpen, setIsTutorialOpen] = useState(false);
            
            // Cloud Settings
            const [scriptUrl, setScriptUrl] = useState(localStorage.getItem('tawdih_script_url') || '');
            const [folderLinks, setFolderLinks] = useState([]);
            const [isLoadingCloud, setIsLoadingCloud] = useState(false);
            const [newFolderUrl, setNewFolderUrl] = useState('');

            const scrollRef = useRef(null);

            useEffect(() => {
                if (scriptUrl) fetchCloudData();
            }, [scriptUrl]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            const fetchCloudData = async () => {
                if (!scriptUrl) return;
                setIsLoadingCloud(true);
                try {
                    const response = await fetch(scriptUrl);
                    const data = await response.json();
                    setFolderLinks(data);
                } catch (error) {
                    console.error("Gagal mengambil data:", error);
                } finally {
                    setIsLoadingCloud(false);
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === "admin123") setIsAuthenticated(true);
                else alert('Kode salah / Invalid code.');
            };

            const saveConfig = (e) => {
                e.preventDefault();
                localStorage.setItem('tawdih_script_url', scriptUrl);
                alert('URL Skrip berhasil disimpan!');
                fetchCloudData();
            };

            const addFolder = async (e) => {
                e.preventDefault();
                if (!newFolderUrl) return;
                
                // Menentukan nama default atau dari URL
                const folderName = "Folder Google Drive";
                const newFolder = {
                    id: Date.now().toString(),
                    name: folderName,
                    url: newFolderUrl
                };

                setFolderLinks([...folderLinks, newFolder]);
                setNewFolderUrl('');

                if (scriptUrl) {
                    try {
                        await fetch(scriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'add', ...newFolder })
                        });
                    } catch (error) { console.error("Cloud save failed:", error); }
                }
            };

            const deleteFolder = async (id) => {
                setFolderLinks(folderLinks.filter(f => f.id !== id));
                if (scriptUrl) {
                    try {
                        await fetch(scriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'delete', id: id })
                        });
                    } catch (error) { console.error("Cloud delete failed:", error); }
                }
            };

            const handleReset = () => {
                setMessages([]);
                setIsLearned(false);
                setActiveTab('setup');
            };

            const exitAdmin = () => {
                setActiveTab(isLearned ? 'chat' : 'setup');
            };

            const copyScript = () => {
                const el = document.createElement('textarea');
                el.value = APPS_SCRIPT_CODE;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Kode Apps Script berhasil disalin!");
            };

            const callGeminiAPI = async (userPrompt) => {
                const apiKey = ""; 
                const context = folderLinks.map(f => `${f.name}: ${f.url}`).join('\n');
                const payload = {
                    contents: [{ 
                        parts: [{ text: `Anda adalah AI.Tawdih, AI Assistant Tutor. Konteks rujukan:\n${context}\n\nSoalan Pelajar: ${userPrompt}` }] 
                    }]
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) { return null; }
            };

            const startLearningProcess = async () => {
                setIsProcessing(true);
                await new Promise(r => setTimeout(r, 2000));
                setIsLearned(true);
                setActiveTab('chat');
                setIsProcessing(false);
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || isTyping) return;
                const userText = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setIsTyping(true);
                const response = await callGeminiAPI(userText);
                setMessages(prev => [...prev, { role: 'assistant', content: response || "Maaf, terjadi kesalahan respon." }]);
                setIsTyping(false);
            };

            return (
                <div className="flex items-center justify-center min-h-[100dvh] sm:p-4 relative">
                    
                    {/* Tutorial Modal */}
                    {isTutorialOpen && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 sm:p-6">
                            <div className="bg-white w-full max-w-2xl max-h-[85vh] rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl animate-fade-in border border-slate-200">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm sm:text-base">
                                        <IconHelp size={20} className="text-indigo-600" />
                                        Tutorial Storan Google Sheets
                                    </h3>
                                    <button onClick={() => setIsTutorialOpen(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors active:scale-90">
                                        <IconX size={20} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-6 scroll-custom">
                                    <div className="space-y-4 text-xs sm:text-sm text-slate-600 leading-relaxed">
                                        <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                                            <p className="font-bold text-indigo-700 mb-1 italic">Fitur Automasi:</p>
                                            Kode di bawah akan secara otomatis membuat tajuk (header) 'id', 'name', 'url' di Google Sheet Anda saat pertama kali data disimpan.
                                        </div>
                                        <p><strong>1.</strong> Buat file <strong>Google Sheet</strong> baru.</p>
                                        <p><strong>2.</strong> Buka menu <strong>Extensions > Apps Script</strong>.</p>
                                        <p><strong>3.</strong> Hapus semua kode lama, dan tempel kode di bawah ini.</p>
                                        
                                        <div className="relative group">
                                            <div className="absolute right-3 top-3 z-10">
                                                <button onClick={copyScript} className="bg-slate-800 text-white p-2 rounded-xl flex items-center gap-2 text-[10px] hover:bg-black transition-all active:scale-95">
                                                    <IconCopy size={14} /> Salin Kode
                                                </button>
                                            </div>
                                            <pre className="bg-slate-900 text-indigo-300 p-4 rounded-2xl text-[10px] sm:text-xs overflow-x-auto border-4 border-slate-800 mt-2 font-mono">
                                                {APPS_SCRIPT_CODE}
                                            </pre>
                                        </div>

                                        <p><strong>4.</strong> Simpan proyek skrip Anda.</p>
                                        <p><strong>5.</strong> Tekan butang <strong>Deploy > New Deployment</strong>.</p>
                                        <p><strong>6.</strong> Pilih <strong>Web App</strong>, akses ke <strong>Anyone</strong>, tekan <strong>Deploy</strong>.</p>
                                        <p><strong>7.</strong> Salin <strong>URL Web App</strong> dan tempel di bagian Admin aplikasi ini.</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 border-t text-center">
                                    <button onClick={() => setIsTutorialOpen(false)} className="bg-slate-800 text-white px-8 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest active:scale-95">Saya Mengerti</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Interface Container */}
                    <div className="w-full h-[100dvh] sm:h-auto sm:max-w-lg sm:max-h-[90vh] bg-white sm:rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.2)] flex flex-col overflow-hidden border border-slate-200 animate-fade-in relative">
                        
                        {/* Header */}
                        <div className="bg-indigo-600 p-4 sm:p-6 text-white flex justify-between items-center shrink-0 z-10">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white/10 rounded-xl p-1 shrink-0">
                                    <img src={BOT_IMAGE_URL} alt="AI Tawdih Bot" className="w-full h-full object-contain" />
                                </div>
                                <div>
                                    <h2 className="font-bold text-base leading-tight">AI.Tawdih</h2>
                                    <p className="text-[9px] text-indigo-100 uppercase tracking-widest font-black italic">Official AI Assistant Tutor</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-1.5 sm:gap-2">
                                {scriptUrl && (
                                    <div className={`p-2 rounded-full ${isLoadingCloud ? 'animate-pulse text-yellow-300' : 'text-emerald-400'}`} title="Cloud Sync Aktif">
                                        <IconCloud size={16} />
                                    </div>
                                )}
                                {isLearned && activeTab !== 'admin' && (
                                    <button onClick={handleReset} title="Mulai Ulang" className="p-2 hover:bg-white/10 rounded-full transition-colors active:scale-90">
                                        <IconRefresh size={18} />
                                    </button>
                                )}
                                
                                <div className="flex items-center bg-black/10 rounded-full p-0.5">
                                    <button 
                                        onClick={() => setActiveTab(activeTab === 'admin' ? (isLearned ? 'chat' : 'setup') : 'admin')}
                                        className={`p-2 rounded-full transition-all active:scale-90 ${activeTab === 'admin' ? 'bg-white text-indigo-600 shadow-sm scale-105' : 'hover:bg-white/10 text-white'}`}
                                        title="Menu Admin"
                                    >
                                        <IconLock size={18} />
                                    </button>
                                    
                                    {isAuthenticated && (
                                        <button 
                                            onClick={() => setIsAuthenticated(false)} 
                                            className="p-2 text-white hover:bg-red-500 rounded-full transition-all active:scale-90"
                                            title="Keluar Admin"
                                        >
                                            <IconLogOut size={18} />
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-y-auto bg-slate-50/50 p-4 sm:p-6 space-y-4 scroll-custom">
                            
                            {activeTab === 'admin' && (
                                <div className="h-full flex flex-col items-center space-y-6">
                                    <div className="w-full flex justify-start items-center bg-white p-4 rounded-3xl border border-slate-100 shadow-sm animate-fade-in">
                                        <button onClick={exitAdmin} className="flex items-center gap-2 text-[10px] font-bold text-slate-500 hover:text-indigo-600 transition-colors uppercase tracking-widest">
                                            <IconArrowLeft size={16} /> Kembali ke Tutor
                                        </button>
                                    </div>

                                    {!isAuthenticated ? (
                                        <div className="w-full bg-white p-8 rounded-[2rem] border border-slate-100 text-center shadow-sm">
                                            <IconLock size={28} className="mx-auto text-indigo-600 mb-4" />
                                            <h3 className="font-bold text-slate-800 text-xs mb-6 uppercase tracking-widest">Akses Pentadbir</h3>
                                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                                <input 
                                                    type="password" 
                                                    placeholder="Kata sandi keamanan..."
                                                    className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-indigo-100 text-center transition-all font-bold"
                                                    value={adminPassword}
                                                    onChange={(e) => setAdminPassword(e.target.value)}
                                                />
                                                <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-[11px] uppercase tracking-widest active:scale-95 shadow-xl shadow-indigo-100 transition-all">Masuk</button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="w-full space-y-5 animate-fade-in pb-10">
                                            {/* Config & Help Button */}
                                            <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                                                <div className="flex justify-between items-center mb-3">
                                                    <h3 className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider flex items-center gap-2">
                                                        <IconCloud size={14} /> Konfigurasi Cloud
                                                    </h3>
                                                    <button 
                                                        onClick={() => setIsTutorialOpen(true)}
                                                        className="text-[9px] font-bold text-indigo-500 bg-indigo-50 px-3 py-1.5 rounded-full hover:bg-indigo-100 flex items-center gap-1 transition-all"
                                                    >
                                                        <IconHelp size={12} /> Tutorial & Kode Skrip
                                                    </button>
                                                </div>
                                                <form onSubmit={saveConfig} className="space-y-2">
                                                    <input 
                                                        type="url" 
                                                        placeholder="URL Google Apps Script Web App..."
                                                        className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] outline-none focus:ring-2 focus:ring-indigo-400 font-mono"
                                                        value={scriptUrl}
                                                        onChange={(e) => setScriptUrl(e.target.value)}
                                                    />
                                                    <button className="w-full bg-slate-900 text-white py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest">Simpan Konfigurasi</button>
                                                </form>
                                            </div>

                                            {/* MASUKKAN RUJUKAN BARU */}
                                            <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                                                <h3 className="text-[10px] font-bold text-slate-800 mb-3 uppercase tracking-wider text-center">Masukkan Rujukan Baru</h3>
                                                <form onSubmit={addFolder} className="space-y-2">
                                                    <input 
                                                        type="url" 
                                                        placeholder="Tempel Tautan Google Drive Di Sini..."
                                                        className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-[10px] outline-none focus:ring-2 focus:ring-indigo-400"
                                                        value={newFolderUrl}
                                                        onChange={(e) => setNewFolderUrl(e.target.value)}
                                                    />
                                                    <button className="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest active:scale-95 transition-all">Simpan ke Storan</button>
                                                </form>
                                            </div>

                                            {/* Daftar Data */}
                                            <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                                                <h3 className="text-[10px] font-bold text-slate-800 mb-3 uppercase tracking-wider">Daftar Rujukan Aktif</h3>
                                                <div className="space-y-2 max-h-[200px] overflow-y-auto pr-2 scroll-custom">
                                                    {folderLinks.length === 0 ? (
                                                        <p className="text-[9px] text-slate-400 text-center py-4 italic font-medium">Belum ada rujukan tersimpan.</p>
                                                    ) : (
                                                        folderLinks.map(folder => (
                                                            <div key={folder.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 animate-fade-in">
                                                                <div className="overflow-hidden">
                                                                    <p className="text-[10px] font-bold text-slate-700 truncate">{folder.name}</p>
                                                                    <p className="text-[8px] text-slate-400 truncate max-w-[150px] italic">{folder.url}</p>
                                                                </div>
                                                                <button onClick={() => deleteFolder(folder.id)} className="p-2 text-red-400 hover:text-red-600 transition-colors">
                                                                    <IconTrash size={14} />
                                                                </button>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'setup' && (
                                <div className="h-full flex flex-col items-center justify-center text-center p-4">
                                    <div className="w-32 h-32 sm:w-44 sm:h-44 mb-6 shrink-0 animate-float">
                                        <img src={BOT_IMAGE_URL} alt="Bot" className="w-full h-full object-contain drop-shadow-2xl" />
                                    </div>
                                    <h3 className="font-bold text-slate-800 mb-4 text-lg tracking-tight leading-tight uppercase">AI.TAWDIH</h3>
                                    <p className="text-[10px] sm:text-[12px] text-slate-500 leading-tight mb-8 font-medium px-2 whitespace-nowrap">
                                        Sila tekan Mula Bimbingan untuk bertanya soalan dengan AI.Tawdih Tutor.
                                        <span className="opacity-60 block mt-1 font-normal italic text-[9px] text-indigo-500 whitespace-normal">
                                            Please press Start Tutoring to ask questions with AI.Tawdih Tutor.
                                        </span>
                                    </p>
                                    <button 
                                        onClick={startLearningProcess}
                                        disabled={isProcessing}
                                        className="w-full max-w-[280px] bg-indigo-600 text-white py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-2xl shadow-indigo-200 flex items-center justify-center gap-4 hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50 min-h-[56px]"
                                    >
                                        {isProcessing ? <IconLoader size={20} /> : 'Mula Bimbingan / Start Tutoring'}
                                    </button>
                                </div>
                            )}

                            {activeTab === 'chat' && (
                                <div className="space-y-4 pb-4">
                                    {messages.length === 0 && (
                                        <div className="text-center py-20 text-slate-400 text-[11px] italic font-medium leading-relaxed">
                                            Tanya soalan akademik berkaitan topik anda.<br/>
                                            <span className="opacity-60">Sedia membantu bimbingan anda.</span>
                                        </div>
                                    )}
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[88%] p-4 rounded-[1.8rem] text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none font-medium'}`}>
                                                {m.content}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="flex gap-2 ml-4 items-center animate-pulse">
                                            <div className="flex gap-1">
                                                <span className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></span>
                                                <span className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                                <span className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                            </div>
                                            <span className="text-[9px] text-indigo-400 font-bold uppercase tracking-tighter">Tutor Berfikir...</span>
                                        </div>
                                    )}
                                    <div ref={scrollRef} />
                                </div>
                            )}
                        </div>

                        {activeTab === 'chat' && (
                            <div className="p-4 sm:p-6 bg-white border-t border-slate-100 shrink-0">
                                <form onSubmit={sendMessage} className="relative flex items-center gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Tanya tutor anda..."
                                        className="flex-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-indigo-100 transition-all font-medium placeholder:text-slate-400"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                    />
                                    <button 
                                        type="submit"
                                        className="p-3.5 bg-indigo-600 text-white rounded-xl shadow-xl shadow-indigo-100 active:scale-95 transition-all flex items-center justify-center shrink-0"
                                    >
                                        <IconSend size={20} />
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
